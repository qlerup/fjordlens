<!doctype html>
<html lang="{{ ui_lang|default('da') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FjordLens Share</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v={{ app_build }}">
</head>
<body>
  <main class="main" style="max-width:1200px;margin:0 auto;">
    <header class="topbar" style="justify-content:space-between;">
      <div>
        <h2 id="shareTitle" style="margin:0;">Delt mappe</h2>
        <div id="shareMeta" class="mini-label">Indlæser…</div>
      </div>
      <div id="shareActions" class="toolbar" style="gap:8px;">
        <label id="uploadWrap" class="btn" style="display:none;">
          <input id="shareFileInput" type="file" accept="image/*,video/*,.dng,.cr2,.cr3,.nef,.arw,.rw2,.raf,.orf,.srw,.pef" multiple style="display:none;" />
          <span id="uploadLabel">Vælg filer</span>
        </label>
        <button id="uploadBtn" class="btn primary" style="display:none;">Upload</button>
        <button id="deleteBtn" class="btn danger" style="display:none;" disabled>Slet valgte</button>
      </div>
    </header>

    <section id="shareStatus" class="status hidden"></section>

    <section id="shareAuthBox" class="sidebar-card hidden" style="max-width:520px;margin:20px auto;">
      <div class="sidebar-card-title" id="authTitle">Adgang kræves</div>
      <div class="form-row" id="authNameWrap">
        <label for="authName" id="authNameLabel">Dit navn</label>
        <input id="authName" class="mapper-input" type="text" placeholder="Skriv dit navn" />
      </div>
      <div class="form-row reveal-wrap">
        <label for="authPassword" id="authLabel">Indtast adgangskode</label>
        <input id="authPassword" class="mapper-input" type="password" placeholder="Adgangskode" style="padding-right:42px;" />
        <button id="authPwReveal" type="button" class="reveal-btn" aria-label="Vis adgangskode">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5c4.5 0 8.4 2.9 10 7-1.6 4.1-5.5 7-10 7s-8.4-2.9-10-7c1.6-4.1 5.5-7 10-7zm0 2c-3.3 0-6.3 2.1-7.6 5 1.3 2.9 4.3 5 7.6 5s6.3-2.1 7.6-5c-1.3-2.9-4.3-5-7.6-5zm0 2.5a2.5 2.5 0 110 5 2.5 2.5 0 010-5z"/></svg>
        </button>
      </div>
      <div class="actions" style="justify-content:flex-end;">
        <button id="authBtn" class="btn primary">Fortsæt</button>
      </div>
    </section>

    <section id="shareGrid" class="gallery-grid"></section>

    <!-- Simple viewer for shared links (popup with prev/next) -->
    <div id="shareViewer" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;flex-direction:column;z-index:10000;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;">
        <div id="shareViewerTitle" class="mini-label" style="color:#d7e0f1;opacity:.9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:72vw;"></div>
        <div>
          <button id="shareViewerClose" class="btn" style="min-width:86px;">Luk</button>
        </div>
      </div>
      <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;">
        <button id="shareViewerPrev" class="btn" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.85;">◀</button>
        <img id="shareViewerImg" alt="" style="max-width:92vw;max-height:82vh;border-radius:10px;box-shadow:0 6px 22px rgba(0,0,0,.5);" />
        <button id="shareViewerNext" class="btn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);opacity:.85;">▶</button>
      </div>
    </div>
  </main>

  <script>
    window.SHARE_TOKEN = {{ share_token|tojson }};
  </script>
  <script>
    (function(){
      const i=document.getElementById('authPassword');
      const b=document.getElementById('authPwReveal');
      if(b){ b.addEventListener('click',()=>{ if(!i) return; i.type=(i.type==='password')?'text':'password'; i.focus({preventScroll:true}); }); }
    })();
  </script>
  <script src="{{ url_for('static', filename='vendor/tus.min.js', v=app_build) }}"></script>
  <script>
    // Fallback: load tus-js-client from CDN if local bundle is missing
    if (!(window.tus && typeof window.tus.Upload === 'function')) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/tus-js-client@4.2.3/dist/tus.min.js"><\\/script>');
    }
  </script>
  <script src="{{ url_for('static', filename='shared.js') }}?v={{ app_build }}"></script>
</body>
</html>
